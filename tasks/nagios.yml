---
- name: Create admin user
  ansible.builtin.lineinfile:
    path: /etc/nagios4/htdigest.users
    line: "nagiosadmin:Nagios4:{{ ('nagiosadmin:Nagios4:' + nagios_admin_password) | hash('md5') }}"
    create: true
    owner: nagios
    group: www-data
    mode: '640'

- name: Activate digest auth
  ansible.builtin.lineinfile:
    path: /etc/nagios4/cgi.cfg
    regexp: '^use_authentication=0'
    line: 'use_authentication=1'

- name: Enable CGI module on Apache
  community.general.apache2_module:
    state: present
    name: cgi

- name: Copy nagios4.conf
  ansible.builtin.copy:
    src: nagios4.conf
    dest: /etc/apache2/sites-available/nagios4.conf
    owner: root
    group: root
    mode: '644'

- name: Apply server.cfg from template
  ansible.builtin.template:
    src: server.cfg.j2
    dest: /etc/nagios4/conf.d/server.cfg
    owner: root
    group: root
    mode: '644'

- name: Apply contacts.cfg from template
  ansible.builtin.template:
    src: contacts.cfg.j2
    dest: /etc/nagios4/objects/contacts.cfg
    owner: root
    group: root
    mode: '644'


- name: Enable the nagios4 configuration
  ansible.builtin.file:
    src: /etc/apache2/sites-available/nagios4.conf
    dest: /etc/apache2/sites-enabled/nagios4.conf
    state: link
  notify:
    - Restart Apache
    - Restart Nagios
